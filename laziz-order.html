<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Laziz Restaurant | Order</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0f0f0f;
color:white;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
font-family:Playfair Display;
color:#F4A261;
}

.search{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:.3s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.name{
font-weight:600;
font-size:15px;
}

.price{
color:#F4A261;
margin:6px 0;
}

.btn{
background:#E63946;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.qty{
display:flex;
gap:8px;
align-items:center;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#E63946;
padding:16px 24px;
border-radius:30px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h1>Laziz Restaurant</h1>

<input class="search" id="search" placeholder="Search dishes">

<div class="menu-grid" id="menu"></div>

</div>

<div class="cart" id="cartBtn">
🛒 0 items
</div>

<script>

const MENU_KEY="laziz_menu_v2"
const ORDERS_KEY="laziz_orders"

let cart={}
let menu=[]


/* AUTO IMAGE BASED ON DISH NAME */

function getDishImage(name){

name=name.toLowerCase()

if(name.includes("biryani"))
return "https://source.unsplash.com/600x600/?biryani"

if(name.includes("paneer"))
return "https://source.unsplash.com/600x600/?paneer+curry"

if(name.includes("chicken"))
return "https://source.unsplash.com/600x600/?chicken+curry"

if(name.includes("mutton"))
return "https://source.unsplash.com/600x600/?mutton+curry"

if(name.includes("noodle"))
return "https://source.unsplash.com/600x600/?noodles"

if(name.includes("rice"))
return "https://source.unsplash.com/600x600/?fried+rice"

if(name.includes("roll"))
return "https://source.unsplash.com/600x600/?kathi+roll"

if(name.includes("naan") || name.includes("roti"))
return "https://source.unsplash.com/600x600/?naan"

if(name.includes("soup"))
return "https://source.unsplash.com/600x600/?soup"

if(name.includes("gulab"))
return "https://source.unsplash.com/600x600/?gulab+jamun"

return "https://source.unsplash.com/600x600/?indian+food"

}


/* LOAD MENU */

function loadMenu(){

const saved=localStorage.getItem(MENU_KEY)

menu=saved?JSON.parse(saved):[]

renderMenu()

}


function renderMenu(){

const search=document.getElementById("search").value.toLowerCase()

let html=""

menu
.filter(d=>d.name.toLowerCase().includes(search))
.forEach(item=>{

const qty=cart[item.id]||0

const price=item.price2?item.price2:item.price

html+=`

<div class="card">

<img src="${getDishImage(item.name)}">

<div class="card-body">

<div class="name">${item.name}</div>

<div class="price">

${item.price2
?`Half ₹${item.price} | Full ₹${item.price2}`
:`₹${item.price}`}

</div>

${
qty>0
?`
<div class="qty">

<button class="btn" onclick="changeQty(${item.id},-1)">-</button>

<span>${qty}</span>

<button class="btn" onclick="changeQty(${item.id},1)">+</button>

</div>
`
:`
<button class="btn" onclick="addItem(${item.id})">Add</button>
`
}

</div>

</div>

`

})

document.getElementById("menu").innerHTML=html

}


function addItem(id){

cart[id]=1

updateCart()

renderMenu()

}

function changeQty(id,d){

cart[id]=(cart[id]||0)+d

if(cart[id]<=0) delete cart[id]

updateCart()

renderMenu()

}


function updateCart(){

const count=Object.values(cart).reduce((a,b)=>a+b,0)

document.getElementById("cartBtn").innerText=`🛒 ${count} items`

}


document.getElementById("search").oninput=renderMenu

loadMenu()

</script>

</body>
</html>
